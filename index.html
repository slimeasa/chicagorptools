  <style>

    .action-btn:hover{background:#161f2e;color:#cbd5e1}

<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useRef,useCallback,useEffect} = React;

const C={bg:"#0c111a",navy:"#0f1623",yellow:"#f5c500",muted:"#3d4a5c"};
const CHAR_COLORS=["#f5c500","#6ecfa8","#7dd3fc","#f87171","#cc99ff","#ffa94d","#a9e34b","#f783ac","#74c0fc","#63e6be"];

function parseLine(line){
  const t=line.trimStart();
  const low=t.toLowerCase();
  if(!t) return {type:"empty", content:""};

  // * /me and /do → purple (class "me")
  if(t[0]==="*") return {type:"me", content:line};

  // > /ame → purple (same color as me)
  if(t[0]===">") return {type:"ame", content:line};

  // $ item → yellow (GTA World system style)
  if(t[0]==="$") return {type:"yellow", content:line};

  // ! system → yellow (they strip the ! and show yellow)
  if(t[0]==="!") return {type:"yellow", content:line.slice(1).trimStart()};

  // (( )) OOC → grey
  if(t.startsWith("((")) return {type:"ooc", content:line};

  // diz (celular): → yellow
  if(/\bdiz\b\s*\(\s*celular\s*\)/.test(low)) return {type:"yellow", content:line};

  // diz (sussurrando/sussurando): → darkgrey
  if(/\bdiz\b\s*\(\s*(?:sussurrando|sussurando)\s*\)/.test(low)) return {type:"darkgrey", content:line};

  // diz (baixo): → grey
  if(/\bdiz\b\s*\(\s*baixo\s*\)/.test(low)) return {type:"grey", content:line};

  // diz (gritando): → white
  if(/\bdiz\b\s*\(\s*gritando\s*\)/.test(low)) return {type:"white", content:line};

  // # phone prefix → yellow
  if(t[0]==="#") return {type:"yellow", content:line.slice(1).trimStart()};

  // default speech → white
  return {type:"white", content:line};
}

const DEFAULT_TEXT=`* Marcus Webb encosta o carro devagar no beco escuro, apagando os faróis antes de parar.
Marcus Webb diz (normal): Desce aqui, sem chamar atenção.
* Marcus Webb sai do veículo, ajustando o capuz e olhando pros dois lados da rua.
! Você recebeu $2,500 de Marcus Webb.
Danny Reeves diz (celular): Tá bom... mas se der errado, eu nunca estive aqui.
* Danny Reeves puxa o zíper do casaco até o queixo e some na escuridão do beco.`;

const LEGEND=[
  {type:"me",       prefix:"*",   label:"/me e /do — ações"},
  {type:"white",    prefix:"—",   label:"fala normal"},
  {type:"yellow",   prefix:"!",   label:"sistema / celular"},
  {type:"yellow",   prefix:"$",   label:"itens entregues"},
  {type:"grey",     prefix:"—",   label:"diz (baixo)"},
  {type:"darkgrey", prefix:"—",   label:"diz (sussurrando)"},
  {type:"ooc",      prefix:"((",  label:"OOC"},
];

// ── Visual effects: applied on canvas during export and preview ─
function generateNoiseCanvas(w, h, alpha=70){
  const c=document.createElement("canvas");
  c.width=w; c.height=h;
  const ctx=c.getContext("2d");
  const id=ctx.createImageData(w,h);
  for(let i=0;i<id.data.length;i+=4){
    const v=Math.random()*255;
    id.data[i]=v; id.data[i+1]=v; id.data[i+2]=v; id.data[i+3]=alpha;
  }
  ctx.putImageData(id,0,0);
  return c;
}
function applyCanvasFilter(canvas, filter){
  const tmp=document.createElement("canvas");
  tmp.width=canvas.width; tmp.height=canvas.height;
  tmp.getContext("2d").drawImage(canvas,0,0);
  const ctx=canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.filter=filter;
  ctx.drawImage(tmp,0,0);
  ctx.filter="none";
}
function applyCanvasEffects(canvas, effects){
  const ctx=canvas.getContext("2d");
  const w=canvas.width, h=canvas.height;
  const filters=[];
  if(effects.bw)      filters.push("grayscale(1)");
  if(effects.vintage) filters.push("sepia(0.7) saturate(1.3) contrast(1.05)");
  if(effects.brush)   filters.push("contrast(1.25) saturate(1.2)");
  if(filters.length)  applyCanvasFilter(canvas, filters.join(" "));

  if(effects.lightleak){
    const grad=ctx.createLinearGradient(0,0,w,h);
    grad.addColorStop(0,    "rgba(255,140,60,0.40)");
    grad.addColorStop(0.45, "rgba(255,200,120,0.18)");
    grad.addColorStop(1,    "rgba(255,80,40,0)");
    ctx.save();
    ctx.globalCompositeOperation="screen";
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,w,h);
    ctx.restore();
  }
  if(effects.vignette){
    const grad=ctx.createRadialGradient(w/2,h/2,Math.min(w,h)*0.25, w/2,h/2,Math.max(w,h)*0.7);
    grad.addColorStop(0,   "rgba(0,0,0,0)");
    grad.addColorStop(0.7, "rgba(0,0,0,0.25)");
    grad.addColorStop(1,   "rgba(0,0,0,0.75)");
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,w,h);
  }
  if(effects.grain){
    const noise=generateNoiseCanvas(Math.min(w,512), Math.min(h,512), 70);
    ctx.save();
    ctx.globalCompositeOperation="overlay";
    ctx.fillStyle=ctx.createPattern(noise,"repeat");
    ctx.fillRect(0,0,w,h);
    ctx.restore();
  }
}

// Render the canvas at 2× the image's native resolution. The text is drawn at
// full 2× pixel density, which makes glyph edges visibly crisper when the user
// zooms into the export PNG. Preview and export both use this same factor so
// they stay pixel-perfect with each other.
const RENDER_SCALE = 2;

// ── Native canvas text rendering — pixel-perfect, no SVG/foreignObject blur ──
// Replaces dom-to-image for the export so the text comes out as crisp as the
// browser can render it natively (preview-quality, but at full image resolution).
function wrapText(ctx, text, maxWidth){
  const words = text.split(' ');
  const result = [];
  let line = '';
  for(let i=0; i<words.length; i++){
    const test = line ? (line + ' ' + words[i]) : words[i];
    if(ctx.measureText(test).width > maxWidth && line){
      result.push(line);
      line = words[i];
    } else {
      line = test;
    }
  }
  if(line) result.push(line);
  if(!result.length) result.push('');
  return result;
}

function drawChatOnCanvas(ctx, lines, x, y, fontSize, bgEnabled, bgColor, bgOpacity, maxW, shadowPx){
  const colors={me:"#cc99ff",ame:"#cc99ff",white:"#ffffff",yellow:"#f5c500",green:"#6ecfa8",death:"#f87171",grey:"#aaaaaa",darkgrey:"#888888",lightgrey:"#cccccc",ooc:"#94a3b8",blue:"#7dd3fc"};
  const padX = Math.max(2, Math.round(fontSize*0.35));
  const padY = Math.max(1, Math.round(fontSize*0.15));
  const lineHeight = Math.round(fontSize*1.55);

  ctx.font = `bold ${fontSize}px Arial, Helvetica, sans-serif`;
  ctx.textBaseline = 'top';
  ctx.lineJoin = 'round';
  ctx.miterLimit = 2;

  let bg = null;
  if(bgEnabled){
    const r=parseInt(bgColor.slice(1,3),16),
          g=parseInt(bgColor.slice(3,5),16),
          b=parseInt(bgColor.slice(5,7),16);
    bg = `rgba(${r},${g},${b},${bgOpacity/100})`;
  }

  let cursorY = y;
  const maxTextWidth = Math.max(20, maxW - 2*padX);

  for(const line of lines){
    if(line.type === 'empty'){
      cursorY += lineHeight;
      continue;
    }
    const color = colors[line.type] || '#ffffff';
    const wrapped = wrapText(ctx, line.content, maxTextWidth);

    for(const wLine of wrapped){
      const tw = Math.ceil(ctx.measureText(wLine).width);

      if(bg){
        ctx.fillStyle = bg;
        ctx.fillRect(x, cursorY, tw + 2*padX, lineHeight);
      }

      const tx = x + padX;
      const ty = cursorY + padY;

      // Outline thicker when there's no background — text needs to stand
      // out against arbitrary image content. With bg enabled, a thin
      // 1px-equivalent stroke matches the magician's text-shadow style.
      const outlineMultiplier = bgEnabled ? 2 : 5;
      ctx.lineWidth = shadowPx * outlineMultiplier;
      ctx.strokeStyle = '#000';
      ctx.strokeText(wLine, tx, ty);

      ctx.fillStyle = color;
      ctx.fillText(wLine, tx, ty);

      cursorY += lineHeight;
    }
  }
}

function Block({label,children}){
  return(
    <div>
      <div style={{fontSize:9,letterSpacing:3,color:"#3d4a5c",marginBottom:7,display:"flex",alignItems:"center",gap:7}}>
        <span style={{color:"#f5c500",fontSize:7}}>▌</span>{label}
      </div>
      <div style={{background:"#111827",border:"1px solid #ffffff08",borderRadius:8,padding:"12px 13px"}}>
        {children}
      </div>
    </div>
  );
}
function Slider({label,value,min,max,onChange,unit=""}){
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
        <span style={{fontSize:9,letterSpacing:2,color:"#3d4a5c"}}>{label}</span>
        <span style={{fontSize:9,color:"#f5c500",fontWeight:700}}>{value}{unit}</span>
      </div>
      <input type="range" min={min} max={max} value={value} onChange={e=>onChange(+e.target.value)} style={{width:"100%"}}/>
    </div>
  );
}
const sBtn={borderRadius:5,width:26,height:26,cursor:"pointer",fontSize:13,fontWeight:700,display:"inline-flex",alignItems:"center",justifyContent:"center",flexShrink:0,background:"#0a0f17",border:"1px solid #ffffff12",color:"#6b7a8d"};

function App(){
  const [tab,setTab]=useState("single");
  const [input,setInput]=useState(DEFAULT_TEXT);
  const [chars,setChars]=useState([
    {id:1,name:"Marcus Webb",  color:CHAR_COLORS[0]},
    {id:2,name:"Danny Reeves", color:CHAR_COLORS[1]},
  ]);
  const [activeChar,setActiveChar]=useState(1);
  const [newName,setNewName]=useState("");

  const [singleImg,setSingleImg]=useState(null);
  const [singleEl,setSingleEl]=useState(null);
  const [singleSize,setSingleSize]=useState({w:1280,h:720});
  const [batchImgs,setBatchImgs]=useState([]);
  const [batchSel,setBatchSel]=useState(0);

  // Text position as % of image
  const [textX,setTextX]=useState(2.5);
  const [textY,setTextY]=useState(72);

  const [overlay,setOverlay]=useState(0);
  const [fontSize,setFontSize]=useState(13);
  const [maxWpct,setMaxWpct]=useState(55);
  const [bgEnabled,setBgEnabled]=useState(true);
  const [bgColor,setBgColor]=useState("#000000");
  const [bgOpacity,setBgOpacity]=useState(85);

  const [effects,setEffects]=useState({
    grain:false, vignette:false, lightleak:false,
    brush:false, vintage:false, bw:false,
  });
  const toggleEffect=(k)=>setEffects(p=>({...p,[k]:!p[k]}));
  const cssFilter=[
    effects.bw      && "grayscale(1)",
    effects.vintage && "sepia(0.7) saturate(1.3) contrast(1.05)",
    effects.brush   && "contrast(1.25) saturate(1.2)",
  ].filter(Boolean).join(" ") || "none";

  const [dragging,setDragging]=useState(false);
  const [exporting,setExporting]=useState(false);
  const [exportPct,setExportPct]=useState(0);

  const fileRef=useRef(null);
  const batchFileRef=useRef(null);
  const canvasRef=useRef(null);    // the preview canvas (drawn imperatively)
  const wrapRef=useRef(null);      // outer sizing div
  const textareaRef=useRef(null);
  const dragStart=useRef(null);

  const lines=input.split("\n").map(parseLine);
  const activeImg=tab==="single"?singleImg:(batchImgs[batchSel]?.src||null);
  const activeSize=tab==="single"?singleSize:(batchImgs[batchSel]?{w:batchImgs[batchSel].w,h:batchImgs[batchSel].h}:{w:1280,h:720});

  // preview width
  const [previewW,setPreviewW]=useState(600);
  useEffect(()=>{
    const wrap=wrapRef.current; if(!wrap) return;
    const ro=new ResizeObserver(()=>setPreviewW(wrap.offsetWidth));
    ro.observe(wrap); return()=>ro.disconnect();
  },[]);

  // The preview canvas is sized at the image's native resolution and
  // visually scaled by CSS (width:100%) — preview = export, pixel-perfect.
  const exportMaxWpx = Math.round(activeSize.w*(maxWpct/100));

  // ── Load image ─────────────────────────────────────────────────────────────
  const loadImg=(file,cb)=>{
    if(!file?.type.startsWith("image/")) return;
    const r=new FileReader();
    r.onload=e=>{
      const src=e.target.result;
      const img=new Image();
      img.onload=()=>cb({src,el:img,w:img.naturalWidth,h:img.naturalHeight,name:file.name});
      img.src=src;
    };
    r.readAsDataURL(file);
  };
  const handleSingle=f=>loadImg(f,({src,el,w,h})=>{setSingleImg(src);setSingleEl(el);setSingleSize({w,h});});
  const handleBatch=files=>Array.from(files).forEach(f=>loadImg(f,d=>setBatchImgs(p=>[...p,{id:Date.now()+Math.random(),...d}])));

  // ── Drag text ───────────────────────────────────────────────────────────────
  const onMouseDown=e=>{
    e.preventDefault();
    setDragging(true);
    dragStart.current={mx:e.clientX,my:e.clientY,tx:textX,ty:textY};
  };
  useEffect(()=>{
    const onMove=e=>{
      if(!dragging) return;
      const wrap=wrapRef.current; if(!wrap) return;
      const {mx,my,tx,ty}=dragStart.current;
      const rect=wrap.getBoundingClientRect();
      const dx=(e.clientX-mx)/rect.width*100;
      const dy=(e.clientY-my)/rect.height*100;
      setTextX(v=>Math.min(95,Math.max(0,tx+dx)));
      setTextY(v=>Math.min(95,Math.max(0,ty+dy)));
    };
    const onUp=()=>setDragging(false);
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseup",onUp);
    return()=>{window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);};
  },[dragging]);

  // ── Insert at cursor ────────────────────────────────────────────────────────
  const insertAt=(prefix)=>{
    const ta=textareaRef.current; if(!ta) return;
    const s=ta.selectionStart;
    const lineStart=input.lastIndexOf("\n",s-1)+1;
    const before=input.slice(0,lineStart);
    const after=input.slice(lineStart);
    const needNL=lineStart>0&&input[lineStart-1]!=="\n";
    const ins=(needNL?"\n":"")+prefix;
    setInput(before+ins+after);
    setTimeout(()=>{ta.focus();const p=lineStart+(needNL?1:0)+prefix.length;ta.setSelectionRange(p,p);},0);
  };
  const getChar=()=>chars.find(c=>c.id===activeChar);
  const insertFala=()=>{const c=getChar();insertAt(c?`${c.name} diz (normal): `:"");};
  const insertMe=()=>{const c=getChar();insertAt(c?`* ${c.name} `:"* ");};
  const insertDo=()=>insertAt("* ");

  // ── Add/remove chars ────────────────────────────────────────────────────────
  const addChar=()=>{
    if(!newName.trim()) return;
    const id=Date.now();
    setChars(p=>[...p,{id,name:newName.trim(),color:CHAR_COLORS[p.length%CHAR_COLORS.length]}]);
    setActiveChar(id);setNewName("");
  };
  const removeChar=id=>{
    setChars(p=>p.filter(c=>c.id!==id));
    if(activeChar===id) setActiveChar(chars.find(c=>c.id!==id)?.id||null);
  };

  // ── Export: render at 2× the image resolution for crisp text ──────
  // Same draw routine as the preview, just saved as PNG. The output is 2× the
  // input image dimensions which gives the text more pixels per glyph and
  // keeps it sharp under zoom.
  const doExport=async(imgSrc,imgEl,imgW,imgH,filename)=>{
    const SS = RENDER_SCALE;
    const W = imgW * SS, H = imgH * SS;
    const canvas = document.createElement("canvas");
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext("2d");

    // 1. Base image (upscaled with high-quality smoothing)
    if(imgEl){
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ctx.drawImage(imgEl, 0, 0, W, H);
    } else {
      ctx.fillStyle = "#0f1623";
      ctx.fillRect(0, 0, W, H);
    }

    // 2. Visual effects
    applyCanvasEffects(canvas, effects);

    // 3. Dark overlay (escurecimento)
    if(imgSrc && overlay>0){
      ctx.fillStyle = `rgba(12,17,26,${overlay/100})`;
      ctx.fillRect(0, 0, W, H);
    }

    // 4. Chat text at 2× scale
    const exportMaxW = Math.round((maxWpct/100) * W);
    const tX = (textX/100) * W;
    const tY = (textY/100) * H;
    drawChatOnCanvas(ctx, lines, tX, tY, fontSize*SS, bgEnabled, bgColor, bgOpacity, exportMaxW, SS);

    const blob = await new Promise(res => canvas.toBlob(res, "image/png"));
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url; a.download=filename; a.click();
    URL.revokeObjectURL(url);
  };

  const exportSingle=async()=>{
    setExporting(true);
    await doExport(singleImg, singleEl, singleSize.w, singleSize.h, "chatlog_chicago.png");
    setExporting(false);
  };

  const exportBatch=async()=>{
    if(!batchImgs.length) return;
    setExporting(true); setExportPct(0);
    const zip = new JSZip();
    for(let i=0; i<batchImgs.length; i++){
      const img = batchImgs[i];
      const SS = RENDER_SCALE;
      const W = img.w * SS, H = img.h * SS;
      const canvas = document.createElement("canvas");
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext("2d");

      // 1. Image
      if(img.el){
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        ctx.drawImage(img.el, 0, 0, W, H);
      } else {
        ctx.fillStyle="#0f1623"; ctx.fillRect(0,0,W,H);
      }

      // 2. Effects
      applyCanvasEffects(canvas, effects);

      // 3. Dark overlay
      if(img.src && overlay>0){
        ctx.fillStyle = `rgba(12,17,26,${overlay/100})`;
        ctx.fillRect(0,0,W,H);
      }

      // 4. Chat text at 2× scale
      const exportMaxW = Math.round((maxWpct/100) * W);
      const tX = (textX/100) * W;
      const tY = (textY/100) * H;
      drawChatOnCanvas(ctx, lines, tX, tY, fontSize*SS, bgEnabled, bgColor, bgOpacity, exportMaxW, SS);

      const blob = await new Promise(res => canvas.toBlob(res, "image/png"));
      zip.file(img.name.replace(/\.[^/.]+$/,"")+"_chatlog.png", blob);
      setExportPct(Math.round(((i+1)/batchImgs.length)*100));
    }
    const zb = await zip.generateAsync({type:"blob"});
    const url = URL.createObjectURL(zb);
    const a = document.createElement("a"); a.href=url; a.download="chatlogs_chicago.zip"; a.click();
    URL.revokeObjectURL(url);
    setExporting(false); setExportPct(0);
  };

  // ── Pixel-perfect preview: render to a canvas using the EXACT same draw
  // routine the export uses, at 2× the image's native resolution. The canvas
  // is CSS-scaled to fit the wrapper, so the user sees crisp text and the
  // PNG export is pixel-identical to what the preview shows.
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const SS = RENDER_SCALE;
    const W = activeSize.w * SS, H = activeSize.h * SS;
    if (canvas.width !== W) canvas.width = W;
    if (canvas.height !== H) canvas.height = H;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, W, H);

    let imgEl = null;
    if (tab === "single" && singleEl) imgEl = singleEl;
    else if (tab === "batch" && batchImgs[batchSel]?.el) imgEl = batchImgs[batchSel].el;

    if (imgEl) {
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ctx.drawImage(imgEl, 0, 0, W, H);
    } else {
      ctx.fillStyle = "#0f1623";
      ctx.fillRect(0, 0, W, H);
    }

    applyCanvasEffects(canvas, effects);

    if (activeImg && overlay > 0) {
      ctx.fillStyle = `rgba(12,17,26,${overlay/100})`;
      ctx.fillRect(0, 0, W, H);
    }

    if (input.trim()) {
      const tX = (textX/100) * W;
      const tY = (textY/100) * H;
      drawChatOnCanvas(ctx, lines, tX, tY, fontSize*SS, bgEnabled, bgColor, bgOpacity, exportMaxWpx*SS, SS);
    }
  });

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center"}}>

      {/* HEADER */}
      <header style={{width:"100%",background:C.navy,borderBottom:`2px solid ${C.yellow}`,padding:"0 28px",boxSizing:"border-box",display:"flex",alignItems:"center",gap:14,height:56}}>
        <div style={{background:C.yellow,borderRadius:7,width:36,height:36,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,color:C.navy,fontFamily:"'Arial Black',sans-serif",boxShadow:`0 0 14px ${C.yellow}44`}}>CT</div>
        <div>
          <div style={{fontFamily:"'Arial Black',sans-serif",fontSize:15,fontWeight:900,letterSpacing:3,color:C.yellow,lineHeight:1.1}}>
            CHICAGO <span style={{color:"#ffffff33",fontWeight:400,fontSize:10,letterSpacing:2,fontFamily:"sans-serif"}}>Tools RP</span>
          </div>
          <div style={{fontSize:8,color:C.muted,letterSpacing:4}}>CHAT LOG CREATOR</div>
        </div>
        <div style={{flex:1,height:1,background:`linear-gradient(90deg,${C.yellow}35,transparent)`,marginLeft:8}}/>
      </header>

      <main style={{width:"100%",maxWidth:1080,padding:"18px",boxSizing:"border-box"}}>
        <div style={{display:"grid",gridTemplateColumns:"290px 1fr",gap:18}}>

          {/* LEFT */}
          <div style={{display:"flex",flexDirection:"column",gap:11}}>

            {/* Tabs */}
            <div style={{display:"flex",borderBottom:"1px solid #ffffff0c"}}>
              <button className={`tab ${tab==="single"?"active":""}`} onClick={()=>setTab("single")}>UMA IMAGEM</button>
              <button className={`tab ${tab==="batch"?"active":""}`} onClick={()=>setTab("batch")}>LOTE (ZIP)</button>
            </div>

            {/* Image */}
            {tab==="single"?(
              <Block label="FOTO DE FUNDO">
                <div onClick={()=>fileRef.current?.click()} style={{border:`1.5px dashed ${singleImg?C.yellow+"44":"#ffffff15"}`,borderRadius:7,cursor:"pointer",overflow:"hidden",minHeight:singleImg?0:52,display:"flex",alignItems:"center",justifyContent:"center",background:"#00000020"}}>
                  <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handleSingle(e.target.files[0])}/>
                  {singleImg?(
                    <div style={{position:"relative",width:"100%"}}>
                      <img src={singleImg} style={{width:"100%",maxHeight:90,objectFit:"cover",display:"block"}}/>
                      <div style={{position:"absolute",inset:0,background:"#000a",display:"flex",alignItems:"center",justifyContent:"center",opacity:0,transition:".15s"}} onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=0}>
                        <span style={{color:C.yellow,fontSize:10}}>TROCAR</span>
                      </div>
                    </div>
                  ):<span style={{color:C.muted,fontSize:11}}>🖼 Clique para adicionar</span>}
                </div>
                {singleImg&&<div style={{marginTop:8}}><Slider label="ESCURECIMENTO" value={overlay} min={0} max={85} onChange={setOverlay} unit="%"/></div>}
              </Block>
            ):(
              <Block label="FOTOS EM LOTE">
                <div onClick={()=>batchFileRef.current?.click()} style={{border:`1.5px dashed ${C.yellow}44`,borderRadius:7,cursor:"pointer",padding:"10px",textAlign:"center",background:"#00000020",marginBottom:batchImgs.length?10:0}}>
                  <input ref={batchFileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>handleBatch(e.target.files)}/>
                  <span style={{color:C.yellow,fontSize:11}}>+ Adicionar fotos</span>
                </div>
                {batchImgs.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5,maxHeight:120,overflowY:"auto",marginBottom:8}}>
                  {batchImgs.map((img,i)=>(
                    <div key={img.id} className={`img-thumb ${batchSel===i?"selected":""}`} style={{width:62,height:44}} onClick={()=>setBatchSel(i)}>
                      <img src={img.src} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                      <button className="rm" onClick={e=>{e.stopPropagation();setBatchImgs(p=>p.filter(x=>x.id!==img.id));if(batchSel>=i&&batchSel>0)setBatchSel(batchSel-1);}}>✕</button>
                    </div>
                  ))}
                </div>}
                {batchImgs.length>0&&<Slider label="ESCURECIMENTO" value={overlay} min={0} max={85} onChange={setOverlay} unit="%"/>}
              </Block>
            )}

            {/* Characters */}
            <Block label="PERSONAGENS">
              <div style={{display:"flex",gap:6,marginBottom:10}}>
                <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addChar()}
                  placeholder="Nome do personagem"
                  style={{flex:1,background:"#0a0f17",border:"1px solid #ffffff0c",borderRadius:6,color:"#c8d0dc",fontSize:11,padding:"6px 10px",outline:"none"}}/>
                <button onClick={addChar} disabled={!newName.trim()}
                  style={{background:newName.trim()?C.yellow:"#1a2030",color:newName.trim()?C.navy:"#3d4a5c",border:"none",borderRadius:6,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:newName.trim()?"pointer":"default",flexShrink:0}}>
                  + ADD
                </button>
              </div>
              {chars.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
                {chars.map(c=>(
                  <div key={c.id} className={`char-bubble ${activeChar===c.id?"active":""}`}
                    style={{background:c.color+"22",borderColor:activeChar===c.id?c.color+"88":"transparent"}}
                    onClick={()=>setActiveChar(c.id)}>
                    <div style={{width:7,height:7,borderRadius:"50%",background:c.color,flexShrink:0}}/>
                    <span style={{color:c.color}}>{c.name}</span>
                    <button onClick={e=>{e.stopPropagation();removeChar(c.id);}} style={{background:"transparent",border:"none",color:c.color+"88",cursor:"pointer",fontSize:10,padding:"0 0 0 2px"}}>✕</button>
                  </div>
                ))}
              </div>}
              {chars.length>0&&<div>
                <div style={{fontSize:9,color:"#3d4a5c",letterSpacing:2,marginBottom:6}}>INSERIR NO TEXTO</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  <button className="action-btn" style={{borderColor:"#ffffff25",color:"#fff"}} onClick={insertFala}>💬 FALA</button>
                  <button className="action-btn" style={{borderColor:"#cc99ff44",color:"#cc99ff"}} onClick={insertMe}>★ /ME</button>
                  <button className="action-btn" style={{borderColor:"#cc99ff22",color:"#9966cc"}} onClick={insertDo}>◈ /DO</button>
                  <button className="action-btn" style={{borderColor:"#f5c50044",color:"#f5c500"}} onClick={()=>insertAt("$ ")}>$ ITEM</button>
                  <button className="action-btn" style={{borderColor:"#f5c50044",color:"#f5c500"}} onClick={()=>insertAt("# ")}># CEL</button>
                  <button className="action-btn" style={{borderColor:"#f8717144",color:"#f87171"}} onClick={()=>insertAt("! ")}>! SIS</button>
                  <button className="action-btn" style={{borderColor:"#94a3b844",color:"#94a3b8"}} onClick={()=>insertAt("(( ")}>(( OOC</button>
                </div>
                <div style={{fontSize:9,color:"#2a3a50",marginTop:6}}>
                  Ativo: <span style={{color:chars.find(c=>c.id===activeChar)?.color||"#555",fontWeight:700}}>{chars.find(c=>c.id===activeChar)?.name||"—"}</span>
                </div>
              </div>}
            </Block>

            {/* Textarea */}
            <Block label="TEXTO DO CHAT LOG">
              <textarea ref={textareaRef} value={input} onChange={e=>setInput(e.target.value)}
                placeholder={"Clique nos botões acima para inserir linhas..."}
                style={{width:"100%",height:150,background:"#0a0f17",border:"1px solid #ffffff0c",borderRadius:6,color:"#c8d0dc",fontFamily:"'Courier New',monospace",fontSize:11.5,lineHeight:1.7,padding:"9px 11px",resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
            </Block>

            {/* Style */}
            <Block label="ESTILO">
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <button onClick={()=>setFontSize(s=>Math.max(8,s-1))} style={sBtn}>−</button>
                  <Slider label="TAMANHO DA FONTE" value={fontSize} min={8} max={32} onChange={setFontSize} unit="px"/>
                  <button onClick={()=>setFontSize(s=>Math.min(32,s+1))} style={sBtn}>+</button>
                </div>
                <Slider label="LARGURA DO BLOCO" value={maxWpct} min={15} max={95} onChange={setMaxWpct} unit="%"/>
                <div>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:bgEnabled?8:0}}>
                    <span style={{fontSize:9,letterSpacing:2,color:"#3d4a5c"}}>FUNDO DO TEXTO</span>
                    <label style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer"}}>
                      <input type="checkbox" checked={bgEnabled} onChange={e=>setBgEnabled(e.target.checked)} style={{accentColor:C.yellow}}/>
                      <span style={{fontSize:9,color:bgEnabled?C.yellow:C.muted}}>ATIVO</span>
                    </label>
                  </div>
                  {bgEnabled&&<div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <input type="color" value={bgColor} onChange={e=>setBgColor(e.target.value)} style={{width:32,height:22,border:"none",background:"none",cursor:"pointer",borderRadius:3}}/>
                    <div style={{flex:1}}><Slider label="OPACIDADE" value={bgOpacity} min={5} max={100} onChange={setBgOpacity} unit="%"/></div>
                  </div>}
                </div>
              </div>
            </Block>

            {/* Effects */}
            <Block label="EFEITOS">
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {[
                  {key:"grain",     label:"GRANULADO", color:"#a9e34b"},
                  {key:"vignette",  label:"VIGNETTE",  color:"#7dd3fc"},
                  {key:"lightleak", label:"LIGHT",     color:"#ffa94d"},
                  {key:"brush",     label:"BRUSH",     color:"#f783ac"},
                  {key:"vintage",   label:"VINTAGE",   color:"#f5c500"},
                  {key:"bw",        label:"P&B",       color:"#cccccc"},
                ].map(({key,label,color})=>{
                  const active=effects[key];
                  return(
                    <button key={key} onClick={()=>toggleEffect(key)}
                      style={{
                        padding:"6px 11px",borderRadius:5,
                        border:`1px solid ${active?color:"#ffffff14"}`,
                        background:active?color+"22":"#0a0f17",
                        color:active?color:"#94a3b8",
                        fontSize:10,fontWeight:700,cursor:"pointer",
                        letterSpacing:1,transition:"all .15s",
                      }}>
                      {label}
                    </button>
                  );
                })}
              </div>
              <div style={{fontSize:9,color:"#2a3a50",marginTop:8,letterSpacing:1}}>
                Múltiplos efeitos podem ser combinados.
              </div>
            </Block>

            {/* Actions */}
            <div style={{display:"flex",gap:7}}>
              <button onClick={()=>{setInput("");setSingleImg(null);setSingleEl(null);setBatchImgs([]);}}
                style={{flex:1,borderRadius:6,padding:"8px",fontSize:10,letterSpacing:1.5,cursor:"pointer",fontWeight:700,background:"transparent",border:"1px solid #f8717130",color:"#f87171"}}>LIMPAR</button>
              {tab==="single"?(
                <button onClick={exportSingle} disabled={exporting||!singleImg}
                  style={{flex:2.5,borderRadius:6,padding:"8px",fontSize:10,letterSpacing:1.5,cursor:(singleImg&&!exporting)?"pointer":"not-allowed",fontWeight:900,border:"none",background:(singleImg&&!exporting)?C.yellow:"#1a2030",color:(singleImg&&!exporting)?C.navy:"#3d4a5c",fontFamily:"'Arial Black',sans-serif",boxShadow:(singleImg&&!exporting)?`0 3px 14px ${C.yellow}40`:"none"}}>
                  {exporting?"⏳ GERANDO...":"↓ EXPORTAR PNG"}
                </button>
              ):(
                <button onClick={exportBatch} disabled={exporting||!batchImgs.length}
                  style={{flex:2.5,borderRadius:6,padding:"8px",fontSize:10,letterSpacing:1,cursor:(batchImgs.length&&!exporting)?"pointer":"not-allowed",fontWeight:900,border:"none",background:(batchImgs.length&&!exporting)?C.yellow:"#1a2030",color:(batchImgs.length&&!exporting)?C.navy:"#3d4a5c",fontFamily:"'Arial Black',sans-serif"}}>
                  {exporting?`⏳ ${exportPct}%`:`↓ ZIP (${batchImgs.length})`}
                </button>
              )}
            </div>

            {/* Legend */}
            <Block label="LEGENDA">
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                {LEGEND.map(({type,prefix,label})=>{
                  const colors={me:"#cc99ff",ame:"#cc99ff",white:"#ffffff",yellow:"#f5c500",green:"#6ecfa8",death:"#f87171",grey:"#aaaaaa",darkgrey:"#888888",lightgrey:"#cccccc",ooc:"#94a3b8",blue:"#7dd3fc"};
                  const color=colors[type]||"#fff";
                  return(
                    <div key={type+prefix} style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{background:color+"15",border:`1px solid ${color}35`,color,borderRadius:4,padding:"1px 6px",fontFamily:"monospace",fontSize:10,minWidth:22,textAlign:"center",fontWeight:700}}>{prefix}</span>
                      <span style={{color:C.muted,fontSize:10}}>{label}</span>
                    </div>
                  );
                })}
              </div>
            </Block>
          </div>

          {/* RIGHT — PREVIEW */}
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <span style={{fontSize:9,letterSpacing:3,color:C.muted}}>PREVIEW</span>
              <span style={{fontSize:9,color:"#1e2a3a"}}>— arraste o texto</span>
              <div style={{flex:1,height:1,background:`linear-gradient(90deg,${C.yellow}20,transparent)`}}/>
              <span style={{fontSize:9,color:C.muted}}>{activeSize.w}×{activeSize.h}px</span>
            </div>

            <div ref={wrapRef} style={{position:"relative",width:"100%",borderRadius:10,overflow:"hidden",border:`1px solid ${C.yellow}15`,boxShadow:"0 8px 36px #00000055",background:C.navy}}>
              <canvas
                ref={canvasRef}
                onMouseDown={onMouseDown}
                style={{
                  display:"block",
                  width:"100%",
                  height:"auto",
                  cursor:dragging?"grabbing":"grab",
                }}
              />
              {!input.trim()&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
                <span style={{color:"#1e2a3a",fontSize:12}}>Preview aparecerá aqui...</span>
              </div>}
            </div>
          </div>
        </div>
      </main>

      <footer style={{padding:"14px",color:C.muted,fontSize:8,letterSpacing:3,textAlign:"center",borderTop:"1px solid #ffffff06",width:"100%",boxSizing:"border-box",marginTop:8}}>
        CHICAGO TOOLS RP · CHAT LOG CREATOR
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
